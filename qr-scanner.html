<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScanCheck QR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f2027;color:#e8f4f8;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{padding:14px 16px;background:#162436;border-bottom:1px solid rgba(0,212,170,.2);display:flex;align-items:center;gap:12px;flex-shrink:0}
#header h1{font-size:16px;font-weight:600;color:#00d4aa;flex:1}
#btn-close{background:rgba(255,85,85,.15);border:1px solid rgba(255,85,85,.3);color:#ff5555;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
#cam-wrap{position:relative;flex:1;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#vid{width:100%;height:100%;object-fit:cover;display:block}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#frame{width:260px;height:260px;position:relative}
.corner{position:absolute;width:36px;height:36px}
.tl{top:0;left:0;border-top:4px solid #00d4aa;border-left:4px solid #00d4aa;border-radius:4px 0 0 0}
.tr{top:0;right:0;border-top:4px solid #00d4aa;border-right:4px solid #00d4aa;border-radius:0 4px 0 0}
.bl{bottom:0;left:0;border-bottom:4px solid #00d4aa;border-left:4px solid #00d4aa;border-radius:0 0 0 4px}
.br{bottom:0;right:0;border-bottom:4px solid #00d4aa;border-right:4px solid #00d4aa;border-radius:0 0 4px 0}
#scanline{position:absolute;left:4px;right:4px;height:3px;background:linear-gradient(90deg,transparent,#00d4aa,transparent);animation:scan 2s linear infinite}
@keyframes scan{0%{top:4px}100%{top:248px}}
#statusbar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);padding:12px 16px;text-align:center}
#statusbar p{font-size:13px;color:#e8f4f8}
#statusbar span{font-size:11px;color:rgba(255,255,255,.4);display:block;margin-top:3px;font-family:monospace}
#success-overlay{display:none;position:absolute;inset:0;background:rgba(0,30,20,.85);align-items:center;justify-content:center;flex-direction:column;gap:14px}
#success-overlay.show{display:flex}
.big-check{width:80px;height:80px;background:#00d4aa;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#0a1628;font-weight:700}
#manual-wrap{background:#162436;border-top:1px solid rgba(0,212,170,.2);padding:12px 16px;flex-shrink:0;display:none}
#manual-wrap p{font-size:12px;color:#8bafc4;margin-bottom:8px}
#manual-input{width:100%;background:#0f2027;border:1px solid rgba(0,212,170,.3);color:#e8f4f8;font-family:monospace;font-size:11px;padding:8px;border-radius:8px;height:70px;resize:none}
#btn-manual{width:100%;padding:10px;background:#00d4aa;color:#0a1628;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-top:6px}
</style>
</head>
<body>

<div id="header">
  <h1>Escanear QR — ScanCheck</h1>
  <button id="btn-close" onclick="cancelScan()">✕ Cancelar</button>
</div>

<div id="cam-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <div id="overlay">
    <div id="frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scanline"></div>
    </div>
  </div>
  <div id="statusbar">
    <p id="status-msg">Iniciando cámara...</p>
    <span id="status-detail"></span>
  </div>
  <div id="success-overlay">
    <div class="big-check">✓</div>
    <p style="font-size:18px;font-weight:700;color:#00d4aa">QR Detectado</p>
  </div>
</div>

<div id="manual-wrap">
  <p>Pegá el JSON del QR manualmente (copialo con la cámara del celular):</p>
  <textarea id="manual-input" placeholder='{"PC":"OPE-ELOPAPA","SN":"AR020..."}'></textarea>
  <button id="btn-manual" onclick="submitManual()">Importar datos</button>
</div>

<canvas id="cnv" style="display:none"></canvas>

<script>
// ── Utilidades ──────────────────────────────────────────
var vid        = document.getElementById('vid');
var cnv        = document.getElementById('cnv');
var statusMsg  = document.getElementById('status-msg');
var statusDet  = document.getElementById('status-detail');
var stream     = null;
var scanning   = false;
var frameCount = 0;
var useBarcode = false;  // BarcodeDetector API flag
var barcodeDetector = null;

function setStatus(msg, detail) {
  statusMsg.textContent = msg;
  if (detail !== undefined) statusDet.textContent = detail;
}

function cancelScan() {
  stopStream();
  sendResult(null);
}

function stopStream() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
}

function sendResult(data) {
  if (data) {
    document.getElementById('success-overlay').classList.add('show');
  }
  setTimeout(function() {
    if (window.opener) {
      window.opener.postMessage({ type: data ? 'QR_DATA' : 'QR_CANCEL', data: data }, '*');
      window.close();
    } else {
      if (data) sessionStorage.setItem('scancheck_qr_result', data);
      window.history.back();
    }
  }, data ? 900 : 0);
}

// ── BarcodeDetector API (nativa en Chrome Android) ──────
function tryBarcodeDetector() {
  if (!('BarcodeDetector' in window)) return false;
  try {
    barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
    return true;
  } catch(e) { return false; }
}

async function scanWithBarcodeDetector() {
  if (!scanning || !barcodeDetector) return;
  try {
    var codes = await barcodeDetector.detect(vid);
    if (codes && codes.length > 0 && codes[0].rawValue) {
      stopStream();
      sendResult(codes[0].rawValue);
      return;
    }
  } catch(e) {}
  if (scanning) setTimeout(scanWithBarcodeDetector, 200);
}

// ── jsQR inline (MIT license) — cargado desde script tag ─
var jsQRLoaded = false;

function scanWithJsQR() {
  if (!scanning) return;
  if (vid.readyState < 2) { requestAnimationFrame(scanWithJsQR); return; }

  frameCount++;
  cnv.width  = vid.videoWidth  || 640;
  cnv.height = vid.videoHeight || 480;
  var ctx = cnv.getContext('2d');
  ctx.drawImage(vid, 0, 0, cnv.width, cnv.height);

  if (frameCount % 30 === 0) {
    setStatus('Buscando QR...', cnv.width + 'x' + cnv.height + ' · frame ' + frameCount);
  }

  if (typeof jsQR === 'function') {
    var imgData = ctx.getImageData(0, 0, cnv.width, cnv.height);
    var code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'attemptBoth' });
    if (code && code.data) { stopStream(); sendResult(code.data); return; }
  }
  requestAnimationFrame(scanWithJsQR);
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  // Check BarcodeDetector first (Chrome Android native — no CDN needed)
  useBarcode = tryBarcodeDetector();
  setStatus('Iniciando cámara...', useBarcode ? 'API: BarcodeDetector nativa' : 'API: jsQR');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    vid.srcObject = stream;
    vid.play();
  } catch(e) {
    setStatus('Error de cámara: ' + e.message, 'Usá el modo manual abajo');
    document.getElementById('manual-wrap').style.display = 'block';
    return;
  }

  vid.addEventListener('loadeddata', function() {
    scanning = true;
    var w = vid.videoWidth, h = vid.videoHeight;
    setStatus('Apuntá al QR de la pantalla', w + 'x' + h);

    if (useBarcode) {
      setStatus('Apuntá al QR de la pantalla', 'BarcodeDetector activa ✓');
      scanWithBarcodeDetector();
    } else if (typeof jsQR === 'function') {
      setStatus('Apuntá al QR de la pantalla', 'jsQR activa ✓');
      scanWithJsQR();
    } else {
      // jsQR no cargó — mostrar modo manual
      setStatus('Librería no disponible', 'Usá el modo manual abajo');
      document.getElementById('manual-wrap').style.display = 'block';
      scanning = false;
    }
  });
}

// ── Modo manual ──────────────────────────────────────────
function submitManual() {
  var txt = document.getElementById('manual-input').value.trim();
  if (!txt) return;
  stopStream();
  sendResult(txt);
}

// ── Arrancar ─────────────────────────────────────────────
init();
</script>

<!-- jsQR como fallback — se carga DESPUÉS del script principal -->
<!-- Si no carga, el modo manual está disponible -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" 
        onerror="console.warn('jsQR CDN no disponible, usando BarcodeDetector o modo manual')">
</script>

</body>
</html>
